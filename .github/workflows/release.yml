name: Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'main'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_REPOSITORY || format('{0}/sandbox', secrets.DOCKER_USERNAME) }}
      KOYEB_REGISTRY: registry.prod.koyeb.com
      # Repository path only (e.g., "org/app"), not a fully-qualified image name
      KOYEB_REPOSITORY_PATH: ${{ secrets.KOYEB_REGISTRY_REPOSITORY || 'koyeb/sandbox' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Koyeb Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.KOYEB_REGISTRY }}
          username: ${{ secrets.KOYEB_REGISTRY_USERNAME }}
          password: ${{ secrets.KOYEB_REGISTRY_PASSWORD }}

      - name: Build and push (tagged release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.KOYEB_REGISTRY }}/${{ env.KOYEB_REPOSITORY_PATH }}:${{ github.ref_name }}
            ${{ env.KOYEB_REGISTRY }}/${{ env.KOYEB_REPOSITORY_PATH }}:latest

      - name: Build and push (main)
        if: startsWith(github.ref, 'refs/heads/main')
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.KOYEB_REGISTRY }}/${{ env.KOYEB_REPOSITORY_PATH }}:main
            ${{ env.KOYEB_REGISTRY }}/${{ env.KOYEB_REPOSITORY_PATH }}:sha-${{ github.sha }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/sandbox-executor

      - name: Create Pre-release
        if: startsWith(github.ref, 'refs/heads/main')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/sandbox-executor
          prerelease: true
          tag_name: "commit-${{ github.sha }}"
          name: "Pre-release for commit ${{ github.sha }}"
