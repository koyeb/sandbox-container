name: Release

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - "main"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_REPOSITORY || format('{0}/sandbox', secrets.DOCKER_USERNAME) }}
      KOYEB_REGISTRY: registry.prod.koyeb.com
      KOYEB_IMAGE: ${{ startsWith(secrets.KOYEB_REGISTRY_REPOSITORY, 'registry.prod.koyeb.com/') && secrets.KOYEB_REGISTRY_REPOSITORY || format('{0}/{1}', 'registry.prod.koyeb.com', secrets.KOYEB_REGISTRY_REPOSITORY || 'koyeb/sandbox') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Koyeb Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.KOYEB_REGISTRY }}
          username: ${{ secrets.KOYEB_REGISTRY_USERNAME }}
          password: ${{ secrets.KOYEB_REGISTRY_PASSWORD }}

      - name: Build and push full sandbox (tagged release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.KOYEB_IMAGE }}:${{ github.ref_name }}
            ${{ env.KOYEB_IMAGE }}:latest

      - name: Build and push full sandbox (main)
        if: startsWith(github.ref, 'refs/heads/main')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.KOYEB_IMAGE }}:main
            ${{ env.KOYEB_IMAGE }}:sha-${{ github.sha }}

      - name: Build and push sandbox executor (tagged release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.scratch
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ env.IMAGE_NAME }}-executor:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}-executor:latest
            ${{ env.KOYEB_IMAGE }}-executor:${{ github.ref_name }}
            ${{ env.KOYEB_IMAGE }}-executor:latest

      - name: Build and push sandbox executor (main)
        if: startsWith(github.ref, 'refs/heads/main')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.scratch
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}-executor:main
            ${{ env.IMAGE_NAME }}-executor:sha-${{ github.sha }}
            ${{ env.KOYEB_IMAGE }}-executor:main
            ${{ env.KOYEB_IMAGE }}-executor:sha-${{ github.sha }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/sandbox-executor

      - name: Create Pre-release
        if: startsWith(github.ref, 'refs/heads/main')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/sandbox-executor
          prerelease: true
          tag_name: "commit-${{ github.sha }}"
          name: "Pre-release for commit ${{ github.sha }}"
